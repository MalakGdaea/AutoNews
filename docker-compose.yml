version: '3.8'

services:
  scheduler:
    build: .
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./media:/app/media
    command: python scheduler/jobs.py

  upload-api:
    build: .
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./media:/app/media
    command: python api_server.py
    ports:
      - "8080:8080"